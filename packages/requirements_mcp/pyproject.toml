[project]
name = "requirements-mcp"
version = "0.1.0"
description = "SQLite-backed MCP server for requirements management, audit trails, and issue tracking."
requires-python = ">=3.13"
dependencies = [
    "alembic>=1.13.0",
    "gradio>=5.0.0",
    "loguru>=0.7.3",
    "mcp>=1.0.0",
    "pydantic>=2.13.3",
    "sqlalchemy>=2.0.49",
]

[project.scripts]
requirements-db-init = "requirements_mcp.cli:db_init"
requirements-mcp-server = "requirements_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/requirements_mcp"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
