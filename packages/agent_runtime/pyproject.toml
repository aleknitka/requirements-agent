[project]
name = "agent-runtime"
version = "0.1.0"
description = "Agent runtime layer for the requirements-agent."
requires-python = ">=3.13"
dependencies = [
    "loguru>=0.7.3",
    "pydantic>=2.13.3",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_runtime"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
