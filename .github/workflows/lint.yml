name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.1"
          enable-cache: true

      - name: Install workspace
        run: uv sync --all-packages --frozen

      - name: ruff format (check only)
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: detect private keys
        run: uv run pre-commit run detect-private-key --all-files

      - name: bandit
        run: uv run bandit -r packages/requirements_mcp/src

      - name: ty type check
        run: uv run ty check

      - name: interrogate (docstring coverage)
        run: uv run interrogate -n packages/requirements_mcp/src
